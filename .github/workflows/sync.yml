name: Sync

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs when starting a new one.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build the list of target repos from the secret so the matrix job can use it.
  prepare:
    name: Load targets
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.list.outputs.targets }}

    steps:
      - name: Parse repository names
        id: list
        run: |
          # Convert to a compact JSON array, e.g. ["myorg/repo-a","myorg/repo-b"]
          json=$(echo "$TARGET_REPOS" \
            | tr ',' '\n' \
            | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
            | grep -v '^$' \
            | jq -Rsc '[splits("\n")]')
          echo "targets=$json" >> "$GITHUB_OUTPUT"

  sync:
    name: Sync → ${{ matrix.target }}
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.targets) }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout target
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.target }}
          token: ${{ secrets.GH_TOKEN }}
          path: target

      - name: Copy files
        run: |
          set -euo pipefail

          # ------------------------------------------------------------------ #
          # Files / glob patterns that must NOT be copied to target repos.      #
          # Paths are relative to the repository root.  Glob wildcards (*, ?)  #
          # are matched with bash's == operator inside [[ ]].                  #
          # ------------------------------------------------------------------ #
          EXCEPTIONS=(
            "README.md"
            ".github/workflows/sync-to-repos.yml"
          )

          cd source

          # Collect all tracked files.
          mapfile -t ALL_FILES < <(git ls-files)

          for file in "${ALL_FILES[@]}"; do
            # Check whether this file matches any exception pattern.
            skip=false
            for exc in "${EXCEPTIONS[@]}"; do
              if [[ "$file" == $exc ]]; then
                skip=true
                break
              fi
            done

            if $skip; then
              echo "Skipping (excepted): $file"
              continue
            fi

            dest="../target/$file"
            mkdir -p "$(dirname "$dest")"
            cp "$file" "$dest"
            echo "Copied: $file"
          done

      - name: Commit with PR
        run: |
          set -euo pipefail
          cd target

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit for ${{ matrix.target }}."
            exit 0
          fi

          SOURCE_SHA="${{ github.sha }}"
          git commit -m "chore: sync settings from scala-settings@${SOURCE_SHA:0:7}"
          git push
