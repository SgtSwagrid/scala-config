name: Sync

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs when starting a new one.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # Build the list of target repos from the config file so the matrix job can use it.
  prepare:
    name: Load targets
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.list.outputs.targets }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Parse repository names
        id: list
        run: bash .github/scripts/sync-list-targets.sh

  sync:
    name: Sync → ${{ matrix.target }}
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.targets) }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout target
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.target }}
          token: ${{ secrets.GH_TOKEN }}
          path: target

      - name: Sync files
        run: bash source/.github/scripts/sync-files.sh

      - name: Commit with PR
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: bash source/.github/scripts/sync-commit-pr.sh "${{ matrix.target }}" "${{ github.sha }}" "${{ github.repository }}"
